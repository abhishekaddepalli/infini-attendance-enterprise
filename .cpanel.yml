---
deployment:
  tasks:
    # 1. Target Paths (Supports both ifa.infiniforge.cloud and public_html)
    - export DOMAINPATH=../../ifa.infiniforge.cloud
    - export PUBLICPATH=../../public_html
    - export BACKENDPATH=../../backend

    # 2. Ensure directories exist
    - /bin/mkdir -p $BACKENDPATH
    - /bin/mkdir -p $DOMAINPATH
    - /bin/mkdir -p $DOMAINPATH/api
    - /bin/mkdir -p $DOMAINPATH/installer
    - /bin/mkdir -p $PUBLICPATH
    - /bin/mkdir -p $PUBLICPATH/api
    - /bin/mkdir -p $PUBLICPATH/installer

    # 3. Clean up raw source code folders in both web roots to avoid conflicts
    - /bin/rm -rf $DOMAINPATH/src $DOMAINPATH/frontend $DOMAINPATH/docker $DOMAINPATH/docs $DOMAINPATH/cpanel_deploy
    - /bin/rm -rf $PUBLICPATH/src $PUBLICPATH/frontend $PUBLICPATH/docker $PUBLICPATH/docs $PUBLICPATH/cpanel_deploy

    # 4. Copy Backend application core outside web root
    - /bin/cp -R backend/. $BACKENDPATH/
    - /bin/cp backend/env.example $BACKENDPATH/.env

    # 5. Copy Frontend static dist to DOMAINPATH (ifa.infiniforge.cloud)
    - /bin/cp -R frontend/dist/. $DOMAINPATH/
    - /bin/cp frontend/dist/htaccess.txt $DOMAINPATH/.htaccess

    # 6. Copy Frontend static dist to PUBLICPATH (public_html fallback)
    - /bin/cp -R frontend/dist/. $PUBLICPATH/
    - /bin/cp frontend/dist/htaccess.txt $PUBLICPATH/.htaccess

    # 7. Copy Backend API Public files to api/
    - /bin/cp -R backend/public/. $DOMAINPATH/api/
    - /bin/cp backend/public/htaccess.txt $DOMAINPATH/api/.htaccess
    - /bin/cp -R backend/public/. $PUBLICPATH/api/
    - /bin/cp backend/public/htaccess.txt $PUBLICPATH/api/.htaccess

    # 8. Copy Web Installer to installer/
    - /bin/cp -R installer/. $DOMAINPATH/installer/
    - /bin/cp -R installer/. $PUBLICPATH/installer/
