---
deployment:
  tasks:
    # 1. Target Paths (Covers all 3 cPanel subdomain folder variations)
    - export PATH1=../../ifa.infiniforge.cloud
    - export PATH2=../../public_html/ifa.infiniforge.cloud
    - export PATH3=../../public_html
    - export BACKENDPATH=../../backend

    # 2. Ensure directories exist
    - /bin/mkdir -p $BACKENDPATH
    - /bin/mkdir -p $PATH1 $PATH1/api $PATH1/installer
    - /bin/mkdir -p $PATH2 $PATH2/api $PATH2/installer
    - /bin/mkdir -p $PATH3 $PATH3/api $PATH3/installer

    # 3. Clean up raw source code folders in all web roots to prevent conflicts
    - /bin/rm -rf $PATH1/src $PATH1/frontend $PATH1/docker $PATH1/docs $PATH1/cpanel_deploy
    - /bin/rm -rf $PATH2/src $PATH2/frontend $PATH2/docker $PATH2/docs $PATH2/cpanel_deploy
    - /bin/rm -rf $PATH3/src $PATH3/frontend $PATH3/docker $PATH3/docs $PATH3/cpanel_deploy

    # 4. Copy Backend application core outside web root
    - /bin/cp -R backend/. $BACKENDPATH/
    - /bin/cp backend/env.example $BACKENDPATH/.env

    # 5. Copy Frontend dist to PATH1
    - /bin/cp -R frontend/dist/. $PATH1/
    - /bin/cp frontend/dist/htaccess.txt $PATH1/.htaccess

    # 6. Copy Frontend dist to PATH2
    - /bin/cp -R frontend/dist/. $PATH2/
    - /bin/cp frontend/dist/htaccess.txt $PATH2/.htaccess

    # 7. Copy Frontend dist to PATH3
    - /bin/cp -R frontend/dist/. $PATH3/
    - /bin/cp frontend/dist/htaccess.txt $PATH3/.htaccess

    # 8. Copy Backend API Public files to all api/ folders
    - /bin/cp -R backend/public/. $PATH1/api/
    - /bin/cp backend/public/htaccess.txt $PATH1/api/.htaccess
    - /bin/cp -R backend/public/. $PATH2/api/
    - /bin/cp backend/public/htaccess.txt $PATH2/api/.htaccess
    - /bin/cp -R backend/public/. $PATH3/api/
    - /bin/cp backend/public/htaccess.txt $PATH3/api/.htaccess

    # 9. Copy Web Installer to all installer/ folders
    - /bin/cp -R installer/. $PATH1/installer/
    - /bin/cp -R installer/. $PATH2/installer/
    - /bin/cp -R installer/. $PATH3/installer/
