---
deployment:
  tasks:
    # 1. Deploy directly to public_html for main domain & subdomains
    - export DEPLOYPATH=/home/$USER/public_html
    - export BACKENDPATH=/home/$USER/backend

    # 2. Ensure directories exist
    - /bin/mkdir -p $BACKENDPATH
    - /bin/mkdir -p $DEPLOYPATH

    # 3. Copy Backend core framework
    - /bin/cp -R backend/. $BACKENDPATH/

    # 4. Deploy Frontend static app directly to public_html (main domain)
    - /bin/cp -R frontend/dist/. $DEPLOYPATH/
    - /bin/cp frontend/dist/.htaccess $DEPLOYPATH/.htaccess

    # 5. Deploy Backend API to public_html/api
    - /bin/mkdir -p $DEPLOYPATH/api
    - /bin/cp -R backend/public/. $DEPLOYPATH/api/
    - /bin/cp backend/public/.htaccess $DEPLOYPATH/api/.htaccess

    # 6. Deploy Web Installer to public_html/installer
    - /bin/mkdir -p $DEPLOYPATH/installer
    - /bin/cp -R installer/. $DEPLOYPATH/installer/
